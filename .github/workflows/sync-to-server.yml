name: Sync dev to Server main

on:
  push:
    branches:
      - dev

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Server/main
        run: |
          git remote add server https://x-access-token:${{ secrets.SERVER_SYNC_TOKEN }}@github.com/StudyGroup12/Server.git
          git push server dev:main --force
